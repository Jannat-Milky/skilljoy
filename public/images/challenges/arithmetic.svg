<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="arithmeticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#arithmeticGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="50" r="25" fill="#34d399" opacity="0.3"/>
  <circle cx="320" cy="150" r="35" fill="#6ee7b7" opacity="0.2"/>
  
  <!-- Plus sign -->
  <g transform="translate(100, 80)">
    <line x1="0" y1="-20" x2="0" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Minus sign -->
  <g transform="translate(200, 100)">
    <line x1="-15" y1="0" x2="15" y2="0" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Multiplication sign -->
  <g transform="translate(300, 80)">
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="15" y1="-15" x2="-15" y2="15" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Numbers -->
  <text x="50" y="160" font-size="28" font-weight="bold" fill="white">1 + 2 = 3</text>
  <text x="250" y="160" font-size="28" font-weight="bold" fill="white" opacity="0.8">8 ÷ 4 = 2</text>
</svg>