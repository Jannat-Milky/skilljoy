<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="algebraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#algebraGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="70" cy="60" r="30" fill="#fbbf24" opacity="0.3"/>
  <circle cx="330" cy="140" r="40" fill="#fcd34d" opacity="0.2"/>
  
  <!-- Variable X in large text -->
  <text x="80" y="110" font-size="60" font-weight="bold" fill="white" opacity="0.9">x</text>
  
  <!-- Equals sign -->
  <line x1="160" y1="90" x2="200" y2="90" stroke="white" stroke-width="3"/>
  <line x1="160" y1="110" x2="200" y2="110" stroke="white" stroke-width="3"/>
  
  <!-- Number 5 -->
  <text x="260" y="110" font-size="50" font-weight="bold" fill="white">5</text>
  
  <!-- Formula text at bottom -->
  <text x="50" y="170" font-size="18" font-weight="bold" fill="white" opacity="0.9">2x + 3 = 13</text>
</svg>