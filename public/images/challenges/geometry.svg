<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="geometryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#geometryGrad)"/>
  
  <!-- Triangle -->
  <polygon points="80,140 120,60 160,140" fill="#60a5fa" opacity="0.8" stroke="white" stroke-width="2"/>
  
  <!-- Circle -->
  <circle cx="240" cy="90" r="35" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="240" cy="90" r="5" fill="white"/>
  
  <!-- Square -->
  <rect x="320" y="70" width="50" height="50" fill="none" stroke="white" stroke-width="2" rx="2"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="15" fill="#93c5fd" opacity="0.3"/>
  <circle cx="360" cy="160" r="25" fill="#bfdbfe" opacity="0.2"/>
  
  <!-- Text -->
  <text x="80" y="170" font-size="16" font-weight="bold" fill="white">Area = base × height</text>
</svg>