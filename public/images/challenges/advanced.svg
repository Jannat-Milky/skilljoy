<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="advancedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#advancedGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="70" cy="50" r="25" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="330" cy="140" r="35" fill="#ddd6fe" opacity="0.2"/>
  
  <!-- Graph grid -->
  <g stroke="#a78bfa" stroke-width="1" opacity="0.4">
    <line x1="100" y1="60" x2="100" y2="140"/>
    <line x1="100" y1="100" x2="200" y2="100"/>
    <line x1="120" y1="60" x2="120" y2="140"/>
    <line x1="140" y1="60" x2="140" y2="140"/>
    <line x1="160" y1="60" x2="160" y2="140"/>
    <line x1="180" y1="60" x2="180" y2="140"/>
  </g>
  
  <!-- Curve line -->
  <path d="M 100 130 Q 140 70 180 100" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Data points -->
  <circle cx="100" cy="130" r="4" fill="white"/>
  <circle cx="140" cy="70" r="4" fill="white"/>
  <circle cx="180" cy="100" r="4" fill="white"/>
  
  <!-- Formula -->
  <text x="240" y="80" font-size="22" font-weight="bold" fill="white">f(x)</text>
  <text x="240" y="110" font-size="16" fill="white" opacity="0.9">Complex</text>
  <text x="240" y="130" font-size="16" fill="white" opacity="0.9">Problems</text>
</svg>